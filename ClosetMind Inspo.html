<style>
  :root{
    --backdrop:#F4F0E7;     /* warm cream surround (was grey) */
    --accent:#1B1916;       /* active/nav accent — mono by default */
    --paper:#FAF9F7;        /* app page background */
    --card:#FFFFFF;         /* card / box fill */
    --paper-2:#F3F1EA;      /* card field */
    --ink:#1B1916;          /* near-black text */
    --ink-soft:#2A2722;
    --muted:#9A968B;        /* warm grey labels */
    --muted-2:#B4B0A6;
    --placeholder:#E8E6DF;  /* image placeholders */
    --placeholder-ic:#9E9A8F;
    --hair:#E2DFD6;         /* hairlines */
    --hair-2:#E7E4DB;
    --black:#0C0B0A;        /* header / nav */
    --tag-border:#1B1916;
    --sans:-apple-system,"Helvetica Neue",Helvetica,Arial,system-ui,sans-serif;
    --serif:"Newsreader",Georgia,"Times New Roman",serif;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;}
  html,body{height:100%;}
  html{background:#F4F0E7;}
  body{
    background:var(--backdrop);
    font-family:var(--sans);
    display:flex;align-items:center;justify-content:center;
    min-height:100vh;overflow:hidden;
  }
  /* soft warm wash like the original screenshot — driven by --backdrop */
  #stage{
    position:fixed;inset:0;
    background:
      radial-gradient(125% 100% at 50% -5%,
        color-mix(in srgb, var(--backdrop) 55%, #ffffff) 0%,
        var(--backdrop) 60%,
        color-mix(in srgb, var(--backdrop) 88%, #000000) 100%);
    display:flex;align-items:center;justify-content:center;
  }
  #scaler{transform-origin:center center;visibility:hidden;}

  /* ───────── Device ───────── */
  .device{
    width:402px;height:874px;border-radius:54px;
    background:#0C0B0A;
    padding:11px;
    box-shadow:
      0 50px 90px -20px rgba(40,36,28,.45),
      0 20px 50px -25px rgba(40,36,28,.4),
      0 0 0 1px rgba(0,0,0,.06);
    position:relative;
  }
  .screen{
    position:relative;width:100%;height:100%;
    border-radius:43px;overflow:hidden;background:var(--paper);
    display:flex;flex-direction:column;
  }
  /* dynamic island */
  .island{
    position:absolute;top:9px;left:50%;transform:translateX(-50%);
    width:124px;height:35px;border-radius:20px;background:#000;z-index:60;
  }

  /* ───────── Status bar (white on black header) ───────── */
  .statusbar{
    height:54px;flex:0 0 auto;background:var(--black);
    display:flex;align-items:flex-end;justify-content:space-between;
    padding:0 30px 8px;color:#fff;position:relative;z-index:20;
  }
  .sb-time{font-weight:600;font-size:16px;letter-spacing:.2px;}
  .sb-icons{display:flex;align-items:center;gap:7px;}

  /* ───────── App header ───────── */
  .header{
    background:var(--black);color:#fff;
    padding:24px 22px 24px;
    display:flex;align-items:flex-start;justify-content:space-between;
  }
  .brand .logo{
    font-family:var(--serif);font-weight:600;font-size:30px;letter-spacing:.2px;
    line-height:1;color:#FBFAF6;padding-top:3px;
  }
  .brand .tagline{
    font-size:10.5px;letter-spacing:2.4px;color:#8C887E;margin-top:4px;font-weight:500;
  }
  .header-actions{display:flex;align-items:center;gap:18px;padding-top:4px;}
  .header-actions svg{display:block;}

  /* ───────── Scroll body ───────── */
  .body{flex:1 1 auto;overflow-y:auto;overflow-x:hidden;background:var(--paper);}
  .body::-webkit-scrollbar{width:0;height:0;}

  /* date / weather strip */
  .daystrip{
    display:flex;align-items:center;justify-content:space-between;
    padding:18px 22px 16px;border-bottom:1px solid var(--hair);
  }
  .daystrip .date{font-size:12px;letter-spacing:1.6px;color:var(--ink);font-weight:600;}
  .daystrip .weather{display:flex;align-items:center;gap:7px;font-size:13px;color:var(--muted);letter-spacing:.2px;}

  section{padding:22px 22px 6px;}
  .sec-head{
    display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;
  }
  .sec-title{font-size:12px;letter-spacing:1.8px;color:var(--muted);font-weight:600;}
  .sec-link{font-size:12px;letter-spacing:1.4px;color:var(--ink);font-weight:600;
    text-decoration:underline;text-underline-offset:3px;text-decoration-thickness:1px;}

  /* Today's suggestion card */
  .suggest{
    border:1px solid var(--hair);background:var(--card);border-radius:2px;
    padding:14px 14px 16px;
  }
  .suggest .thumbs{display:grid;grid-template-columns:repeat(4,1fr);gap:9px;}
  .thumb{aspect-ratio:1/1.18;background:var(--placeholder);display:flex;align-items:center;justify-content:center;}
  .thumb svg{width:34px;height:34px;}
  .suggest .meta{display:flex;align-items:center;justify-content:space-between;margin-top:16px;}
  .suggest .name{font-family:var(--serif);font-weight:600;font-size:20px;color:var(--ink);line-height:1.1;}
  .suggest .sub{font-size:11px;letter-spacing:1.3px;color:var(--muted);margin-top:7px;font-weight:500;}

  /* Rediscover */
  .redis{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
  .redis .card{border:1px solid var(--hair);background:var(--card);padding:0;}
  .redis .ph{aspect-ratio:1/1.26;background:var(--placeholder);display:flex;align-items:center;justify-content:center;margin:14px 14px 0;}
  .redis .ph svg{width:48px;height:48px;}
  .redis .cap{padding:13px 13px 16px;}
  .redis .name{font-family:var(--serif);font-weight:600;font-size:15.5px;letter-spacing:-.1px;color:var(--ink);line-height:1.15;white-space:nowrap;}
  .redis .sub{font-size:9.5px;letter-spacing:.9px;color:var(--muted);margin-top:7px;font-weight:500;white-space:nowrap;}

  /* Recently added list */
  .recent .row{
    display:flex;align-items:center;gap:14px;padding:15px 0;border-top:1px solid var(--hair);
  }
  .recent .row:first-child{border-top:none;}
  .recent .ic{width:52px;height:52px;background:var(--placeholder);flex:0 0 auto;display:flex;align-items:center;justify-content:center;}
  .recent .ic svg{width:26px;height:26px;}
  .recent .info{flex:1 1 auto;min-width:0;}
  .recent .name{font-family:var(--serif);font-weight:600;font-size:17px;color:var(--ink);line-height:1.1;}
  .recent .sub{font-size:11px;letter-spacing:1px;color:var(--muted);margin-top:6px;font-weight:500;text-transform:uppercase;}
  .tag{font-size:10px;letter-spacing:1.4px;color:var(--accent);font-weight:600;
    border:1px solid var(--accent);padding:5px 9px;flex:0 0 auto;}

  .body-pad{height:18px;}

  /* ───────── Tab bar ───────── */
  .tabbar{
    flex:0 0 auto;background:var(--paper);border-top:1px solid var(--hair);
    padding:12px 26px 6px;
    display:flex;align-items:flex-start;justify-content:space-between;
  }
  .tab{flex:0 0 auto;display:flex;flex-direction:column;align-items:center;gap:7px;color:var(--muted);}
  .tab.active{color:var(--accent);}
  .tab svg{width:24px;height:24px;display:block;flex:0 0 24px;}
  .tab .lbl{font-size:9.5px;letter-spacing:1.3px;font-weight:600;}
  .tab .dot{width:3px;height:3px;border-radius:50%;background:var(--accent);margin-top:1px;}

  /* ───────── Inspo header ───────── */
  .ihead{align-items:center;padding:16px 22px;}
  .ihead .brand .logo{font-family:var(--serif);font-weight:600;font-size:30px;letter-spacing:.2px;line-height:1;color:#FBFAF6;}
  .ihead .brand .tagline{font-size:10.5px;letter-spacing:2.4px;color:#8C887E;margin-top:7px;font-weight:500;line-height:1.4;white-space:nowrap;}

  /* saved count strip */
  .savedstrip{padding:18px 22px 16px;border-bottom:1px solid var(--hair);}
  .savedstrip .count{font-size:12px;letter-spacing:1.8px;color:var(--ink);font-weight:600;line-height:1.5;}

  /* inspo uniform grid */
  .igrid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:18px 22px 8px;}
  .itile{background:var(--placeholder);width:100%;aspect-ratio:1/1.34;cursor:pointer;}

  /* add inspo bar */
  .addbar{flex:0 0 auto;margin:0 22px 12px;background:var(--black);color:#fff;
    display:flex;align-items:center;justify-content:center;gap:11px;
    padding:15px;cursor:pointer;}
  .addbar svg{width:18px;height:18px;}
  .addbar .t{font-size:13px;letter-spacing:1.8px;font-weight:600;}

  /* ───────── Add-inspo bottom sheet ───────── */
  .scrim{position:absolute;inset:0;background:rgba(12,11,10,.42);opacity:0;pointer-events:none;
    transition:opacity .28s ease;z-index:40;}
  .scrim.open{opacity:1;pointer-events:auto;}
  .sheet{position:absolute;left:0;right:0;bottom:0;z-index:50;background:var(--paper);
    border-radius:26px 26px 0 0;padding:14px 24px 26px;
    transform:translateY(102%);transition:transform .32s cubic-bezier(.32,.72,0,1);
    box-shadow:0 -18px 50px -20px rgba(20,18,12,.4);}
  .sheet.open{transform:translateY(0);}
  .sheet .grab{width:42px;height:5px;border-radius:100px;background:#D9D5CB;margin:0 auto 24px;}
  .sheet h2{font-family:var(--serif);font-weight:600;font-size:27px;color:var(--ink);line-height:1.05;}
  .sheet .lead{font-size:11px;letter-spacing:1.8px;color:var(--muted);font-weight:600;margin-top:11px;}
  .addopt{display:flex;align-items:center;gap:18px;padding:24px 0;margin-top:14px;
    border-top:1px solid var(--hair);border-bottom:1px solid var(--hair);cursor:pointer;}
  .addopt .badge{width:54px;height:54px;flex:0 0 auto;background:var(--black);
    display:flex;align-items:center;justify-content:center;}
  .addopt .badge svg{width:22px;height:22px;}
  .addopt .txt{flex:1 1 auto;min-width:0;}
  .addopt .t{font-family:var(--serif);font-weight:600;font-size:18px;color:var(--ink);line-height:1.1;white-space:nowrap;}
  .addopt .d{font-size:13px;color:var(--muted);margin-top:5px;letter-spacing:.1px;}
  .addopt .chk{width:18px;height:18px;flex:0 0 auto;border:1px solid var(--hair);}
  .addopt .arr{width:20px;height:20px;flex:0 0 auto;color:var(--muted-2);}
  .cancelbtn{margin-top:18px;border:1px solid var(--hair);background:transparent;
    width:100%;padding:18px;font-family:var(--sans);font-size:12px;letter-spacing:2px;
    font-weight:600;color:var(--muted);cursor:pointer;}

  /* home indicator */
  .home-ind{height:26px;background:var(--paper);display:flex;align-items:center;justify-content:center;padding-bottom:8px;}
  .home-ind span{width:138px;height:5px;border-radius:100px;background:rgba(20,18,15,.32);}
</style>
</head>

<script>
  // scale device to fit any viewport
  function fit(){
    const m = 36;
    const s = Math.min(1, (window.innerWidth - m) / 402, (window.innerHeight - m) / 874);
    const sc = document.getElementById('scaler');
    sc.style.transform = 'scale(' + s + ')';
    sc.style.visibility = 'visible';
  }
  window.addEventListener('resize', fit);
  fit();

  // smooth screen-to-screen transitions: fade the phone out, navigate, fade back in
  function nav(url){
    window.location.href = url;
  }
  window.nav = nav;
  window.addEventListener('pageshow', function(){
    const sc = document.getElementById('scaler');
    if (sc) sc.style.visibility = 'visible';
  });

  // ── + opens the add-inspo bottom sheet ──
  const scrim = document.getElementById('scrim');
  const sheet = document.getElementById('sheet');
  function openSheet(){ scrim.classList.add('open'); sheet.classList.add('open'); }
  function closeSheet(){ scrim.classList.remove('open'); sheet.classList.remove('open'); }
  document.getElementById('addInspoBtn').addEventListener('click', openSheet);
  document.getElementById('cancelBtn').addEventListener('click', closeSheet);
  scrim.addEventListener('click', closeSheet);

  // ── tap any inspo tile → wardrobe-match detail ──
  document.querySelector('.igrid').addEventListener('click', (e) => {
    if (e.target.closest('.itile')) nav('ClosetMind Inspo Match.html');
  });
</script>

<script type="text/babel">
  const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
    "backdrop": "#F4F0E7",
    "paper": "#FAF9F7",
    "card": "#FFFFFF",
    "serif": "Newsreader",
    "accent": "#1B1916"
  }/*EDITMODE-END*/;

  const SERIF_STACK = {
    "Newsreader": "\"Newsreader\", Georgia, \"Times New Roman\", serif",
    "Spectral": "\"Spectral\", Georgia, serif",
    "Source Serif 4": "\"Source Serif 4\", Georgia, serif"
  };

  function applyTweaks(t){
    const r = document.documentElement.style;
    r.setProperty('--backdrop', t.backdrop);
    r.setProperty('--paper', t.paper);
    r.setProperty('--card', t.card);
    r.setProperty('--accent', t.accent);
    r.setProperty('--serif', SERIF_STACK[t.serif] || SERIF_STACK.Newsreader);
  }

  function App(){
    const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
    React.useEffect(() => { applyTweaks(t); }, [t]);
    return (
      <TweaksPanel>
        <TweakSection label="Background" />
        <TweakColor label="Surround" value={t.backdrop}
          options={['#F4F0E7', '#FBFAF5', '#ECE7DB', '#EDEAE3', '#E7E3DA', '#1B1916']}
          onChange={(v) => setTweak('backdrop', v)} />
        <TweakColor label="App paper" value={t.paper}
          options={['#FAF9F7', '#FFFFFF', '#F6F4EE', '#F1ECE1']}
          onChange={(v) => setTweak('paper', v)} />
        <TweakColor label="Box fill" value={t.card}
          options={['#FFFFFF', '#FAF9F7', '#F6F4EE', '#F1ECE1']}
          onChange={(v) => setTweak('card', v)} />

        <TweakSection label="Type & accent" />
        <TweakSelect label="Heading font" value={t.serif}
          options={['Newsreader', 'Spectral', 'Source Serif 4']}
          onChange={(v) => setTweak('serif', v)} />
        <TweakColor label="Accent" value={t.accent}
          options={['#1B1916', '#A65A3C', '#6E7355', '#4A5A6E', '#7C5A6B']}
          onChange={(v) => setTweak('accent', v)} />
      </TweaksPanel>
    );
  }

  ReactDOM.createRoot(document.getElementById('tweak-root')).render(<App />);
</script>
</body>
</html>
